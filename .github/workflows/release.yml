name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release -p astur

      - name: Stage artifact
        run: Copy-Item target\release\astur.exe astur-windows-x64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: astur-windows-x64.exe
          generate_release_notes: true
          # Hyphenated semver tags (v2.0.0-alpha.1, -beta, -rc) publish as pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
