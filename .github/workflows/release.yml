name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Builds the whole workspace: astur.exe (window manager) + astur-settings.exe
      # (settings GUI). The installer bundles both; the portable exe is astur.exe.
      - name: Build release binaries
        run: cargo build --release

      - name: Stage portable artifact
        run: Copy-Item target\release\astur.exe astur-windows-x64.exe

      # Inno Setup is not preinstalled on the runner; Chocolatey is.
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      # astur.iss reads its own version and emits dist\Astur-Setup-<version>.exe.
      # Needs the prior cargo build so target\release\*.exe exist.
      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\astur.iss'

      # Publish via the official gh CLI (preinstalled on the runner). softprops/
      # action-gh-release was repeatedly getting a GitHub 500 ("Unicorn" HTML page)
      # from the release-create API; gh uses a different client and is more robust.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $files = @((Resolve-Path astur-windows-x64.exe).Path)
          $files += (Get-ChildItem dist/Astur-Setup-*.exe).FullName
          $notes = "**Astur $env:GITHUB_REF_NAME** - portable tiling window manager for Windows 10/11.`n`n" +
                   "- ``astur-windows-x64.exe`` - portable window manager, single exe, no installer.`n" +
                   "- ``Astur-Setup-*.exe`` - installer bundling the window manager + Settings GUI.`n`n" +
                   "See the release commit for the full changelog."
          $ghArgs = @('release','create',$env:GITHUB_REF_NAME) + $files +
                    @('--title',"Astur $env:GITHUB_REF_NAME",'--notes',$notes)
          # Hyphenated semver tags (v2.0.0-alpha.1, -beta, -rc) publish as pre-releases.
          if ($env:GITHUB_REF_NAME -match '-') { $ghArgs += '--prerelease' }
          gh @ghArgs
