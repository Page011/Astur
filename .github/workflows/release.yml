name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Builds the whole workspace: astur.exe (window manager) + astur-settings.exe
      # (settings GUI). The installer bundles both; the portable exe is astur.exe.
      - name: Build release binaries
        run: cargo build --release

      - name: Stage portable artifact
        run: Copy-Item target\release\astur.exe astur-windows-x64.exe

      # Inno Setup is not preinstalled on the runner; Chocolatey is.
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      # astur.iss reads its own version and emits dist\Astur-Setup-<version>.exe.
      # Needs the prior cargo build so target\release\*.exe exist.
      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\astur.iss'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            astur-windows-x64.exe
            dist/Astur-Setup-*.exe
          # Explicit body. Auto-generated notes across a large tag range can 500 the
          # release API (GitHub "Unicorn" page) and fail the publish, so don't use them.
          body: |
            **Astur ${{ github.ref_name }}** — fast, free, portable tiling window
            manager for Windows 10/11.

            Downloads:
            - `astur-windows-x64.exe` — portable window manager, single exe, no installer.
            - `Astur-Setup-*.exe` — installer bundling the window manager + Settings GUI
              (per-user, no admin), with optional run-at-sign-in.

            See the release commit for the full changelog.
          # Hyphenated semver tags (v2.0.0-alpha.1, -beta, -rc) publish as pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
