name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Stage artifact
        # Edition-specific asset name so Lite and Full never collide on the shared
        # repo's releases (Full ships astur-windows-x64.exe from the `main` branch).
        run: Copy-Item target\release\astur.exe astur-lite-windows-x64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: astur-lite-windows-x64.exe
          generate_release_notes: true
